<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Post - BlogSphere</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <nav>
        <h1>BlogSphere</h1>
        <ul>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="index.html">Home</a></li>
        </ul>
    </nav>
</header>

<section class="hero">
    <h2>Create a New Blog Post</h2>
    <p>Write and publish your ideas.</p>
</section>

<div style="width:90%;max-width:700px;margin:40px auto;">

<form>

<input type="text" placeholder="Blog Title" required
style="width:100%;padding:12px;margin:10px 0;border-radius:8px;">

<textarea rows="12" placeholder="Write your blog here..." required
style="width:100%;padding:12px;margin:10px 0;border-radius:8px;"></textarea>

<select style="width:100%;padding:12px;margin:10px 0;border-radius:8px;">
<option>Technology</option>
<option>Programming</option>
<option>Web Development</option>
<option>Data Analytics</option>
<option>Artificial Intelligence</option>
<option>Education</option>
</select>

<button type="submit"
style="width:100%;padding:12px;background:#0077cc;color:white;border:none;border-radius:8px;">
Publish Post
</button>

</form>

</div>

<footer>
<p>© 2026 BlogSphere. All Rights Reserved.</p>
</footer>

<script src="script.js"></script>

</body>
</html>
