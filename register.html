<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - BlogSphere</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <nav>
        <h1>BlogSphere</h1>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="login.html">Login</a></li>
        </ul>
    </nav>
</header>

<section class="hero">
    <h2>Create Your Account</h2>
    <p>Join BlogSphere and start sharing your ideas.</p>
</section>

<div style="width:90%;max-width:400px;margin:40px auto;">
    <form>
        <input type="text" placeholder="Full Name" required
        style="width:100%;padding:12px;margin:10px 0;border-radius:8px;border:1px solid #ccc;">

        <input type="email" placeholder="Email" required
        style="width:100%;padding:12px;margin:10px 0;border-radius:8px;border:1px solid #ccc;">

        <input type="password" placeholder="Password" required
        style="width:100%;padding:12px;margin:10px 0;border-radius:8px;border:1px solid #ccc;">

        <input type="password" placeholder="Confirm Password" required
        style="width:100%;padding:12px;margin:10px 0;border-radius:8px;border:1px solid #ccc;">

        <button type="submit"
        style="width:100%;padding:12px;background:#0077cc;color:white;border:none;border-radius:8px;cursor:pointer;">
            Register
        </button>
    </form>

    <p style="text-align:center;margin-top:15px;">
        Already have an account?
        <a href="login.html">Login</a>
    </p>
</div>

<footer>
    <p>© 2026 BlogSphere. All Rights Reserved.</p>
</footer>

<script src="script.js"></script>

</body>
</html>
